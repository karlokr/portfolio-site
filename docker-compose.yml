services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount your existing database (with write permissions)
      - ./db.sqlite3:/app/db.sqlite3:rw
      # Mount your existing media files
      - ./media:/app/media:rw
    env_file:
      - .env
    environment:
      - DEBUG=false
      - ALLOWED_HOSTS=localhost,127.0.0.1
    # Optional: add a health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3